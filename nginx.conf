server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly; fall back to 404.html (Nuxt's SPA
    # fallback page from the github_pages preset) for unknown routes.
    location / {
        try_files $uri $uri/ /404.html;
    }

    # Cache hashed build assets aggressively
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
